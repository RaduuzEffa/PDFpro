<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDFpro</title>
    <link rel="icon" type="image/png" href="PDFextractor.png">
    <link rel="apple-touch-icon" href="PDFextractor.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="stylesheet" href="style.css">
    
    <!-- Knihovny z CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.5/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@0.0.4/dist/fontkit.umd.min.js"></script>
    <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
    <script src="https://unpkg.com/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Hlavička -->
        <header class="header">
            <div class="header-title">
                <div class="icon" style="background: transparent; padding: 0;">
                    <img src="PDFextractor.png" alt="Logo" style="height: 40px; width: 40px; border-radius: 8px; object-fit: cover;">
                </div>
                <div>
                    <h1>PDFpro</h1>
                    <p>Editace, OCR a export do PDF/SVG/DOCX</p>
                </div>
            </div>
            
            <div class="header-actions">
                <label class="btn btn-primary" id="upload-btn">
                    <span>Nahrát (PDF/IMG)</span>
                    <input type="file" id="pdf-upload" accept="application/pdf,image/png,image/jpeg" hidden>
                </label>
                <button id="export-btn" class="btn btn-success" style="display: none;">
                    💾 Uložit PDF
                </button>
                <button id="export-svg-btn" class="btn btn-primary" style="display: none;">
                    🎨 Uložit SVG
                </button>
                <button id="export-docx-btn" class="btn btn-primary" style="display: none;">
                    📝 Uložit DOCX
                </button>
            </div>
        </header>

        <!-- Informační panel (Loading) -->
        <div id="status-panel" class="status-panel hidden">
            <div class="spinner"></div>
            <span id="status-text">Zpracovávám...</span>
        </div>

        <div class="main-layout">
            <div class="sidebar-wrapper" style="display: flex; gap: 1.5rem; align-items: flex-start; flex-shrink: 0;">
            <!-- Panel miniatur (Thumbnails) -->
            <aside id="thumbnails-panel" class="thumbnails-panel hidden">
                <div class="thumbnails-header">
                    <h3>Stránky</h3>
                </div>
                <div id="thumbnails-container" class="thumbnails-container"></div>
                <div class="thumbnails-actions" style="display: flex; flex-direction: column; gap: 8px;">
                    <label class="btn sidebar-action-btn primary-action" style="white-space: nowrap;">
                        ➕ Přidat (PDF/IMG)
                        <input type="file" id="merge-upload" accept="application/pdf,image/png,image/jpeg" hidden>
                    </label>
                    <button id="page-dup-btn" class="btn sidebar-action-btn">📄 Duplikovat stránku</button>
                    <button id="page-rot-btn" class="btn sidebar-action-btn">🔄 Otočit o 90°</button>
                    
                    <div class="move-controls">
                        <div class="move-arrows">
                            <button id="page-up-btn" class="btn sidebar-action-btn mini-btn" title="Posunout výš">⬆️</button>
                            <button id="page-down-btn" class="btn sidebar-action-btn mini-btn" title="Posunout níž">⬇️</button>
                        </div>
                        <div class="move-exact">
                            <span>Za stranu:</span>
                            <input type="number" id="page-move-input" min="1">
                            <button id="page-move-btn" class="btn sidebar-action-btn mini-btn">➤</button>
                        </div>
                    </div>
                    
                    <button id="page-del-btn" class="btn sidebar-action-btn danger-action">🗑️ Smazat stránku</button>
                </div>
            </aside>

            <!-- Nástrojová lišta (Toolbar) -->
            <aside id="toolbar" class="toolbar hidden">
                <div class="toolbar-section">
                    <h3>Nástroje</h3>
                    <button class="tool-btn active" data-mode="select" title="Vybrat a upravit objekty (lze i tažením pro OCR)">
                        👆 Výběr / Přesun
                    </button>
                    <button class="tool-btn" data-mode="ocr" title="Vybere oblast a převede zapečený text na upravitelný">
                        🔍 Výběr pro OCR
                    </button>
                    <button class="tool-btn" data-mode="text" title="Přidá na stránku vlastní statický (zapečený) text">
                        🔤 Nový Text
                    </button>
                    <button class="tool-btn" data-mode="form" title="Přidá interaktivní pole pro vyplnění v PDF readeru">
                        📝 Formulář
                    </button>
                    <button class="tool-btn" data-mode="erase" title="Překryje nechtěný obsah bílým obdélníkem">
                        🧹 Maskovat
                    </button>
                    <button class="tool-btn" data-mode="image" title="Vložit obrázek nebo razítko">
                        🖼️ Obrázek
                    </button>
                    <button class="tool-btn" data-mode="crop" title="Vybere oblast v PDF a převede ji na vnitřní obrázek">
                        ✂️ Výřez
                    </button>
                    <input type="file" id="image-upload" accept="image/png,image/jpeg" hidden>
                </div>
                
                <!-- Panel vlastností (Properties) -->
                <div id="properties-panel" class="toolbar-section disabled">
                    <h3>Vlastnosti</h3>
                    <div class="prop-group">
                        <label>Písmo</label>
                        <select id="prop-font" disabled>
                            <optgroup label="Základní">
                                <option value="Helvetica">Helvetica</option>
                                <option value="TimesRoman">Times Roman</option>
                                <option value="Courier">Courier</option>
                            </optgroup>
                            <optgroup label="Inter">
                                <option value="Inter-Regular">Inter Regular</option>
                                <option value="Inter-Medium">Inter Medium</option>
                                <option value="Inter-Bold">Inter Bold</option>
                            </optgroup>
                            <optgroup label="Roboto">
                                <option value="Roboto-Regular">Roboto Regular</option>
                                <option value="Roboto-Medium">Roboto Medium</option>
                                <option value="Roboto-Bold">Roboto Bold</option>
                            </optgroup>
                            <optgroup label="Roboto Condensed">
                                <option value="RobotoCondensed-Regular">Roboto Cond. Regular</option>
                                <option value="RobotoCondensed-Bold">Roboto Cond. Bold</option>
                            </optgroup>
                            <optgroup label="Lato">
                                <option value="Lato-Regular">Lato Regular</option>
                                <option value="Lato-Bold">Lato Bold</option>
                            </optgroup>
                            <optgroup label="Montserrat">
                                <option value="Montserrat-Regular">Montserrat Regular</option>
                                <option value="Montserrat-Medium">Montserrat Medium</option>
                                <option value="Montserrat-Bold">Montserrat Bold</option>
                            </optgroup>
                            <optgroup label="Open Sans">
                                <option value="OpenSans-Regular">Open Sans Regular</option>
                                <option value="OpenSans-Medium">Open Sans Medium</option>
                                <option value="OpenSans-Bold">Open Sans Bold</option>
                            </optgroup>
                            <optgroup label="Vlastní Fonty" id="custom-fonts-group">
                            </optgroup>
                        </select>
                        <label class="btn btn-primary mt-1 w-full" style="cursor:pointer; font-size: 0.8rem; padding: 4px;">
                            Nahrát font (.ttf/.otf)
                            <input type="file" id="font-upload" accept=".ttf,.otf" hidden>
                        </label>
                    </div>
                    <div class="prop-group">
                        <label>Velikost</label>
                        <input type="number" id="prop-size" value="14" disabled>
                    </div>
                    <div class="prop-group">
                        <label>Barva textu</label>
                        <div class="color-picker-wrap">
                            <input type="color" id="prop-color" value="#000000" disabled>
                        </div>
                    </div>
                    <div class="prop-group">
                        <label>Výška zarovnání (Nudge)</label>
                        <div style="display: flex; gap: 5px; align-items: center;">
                            <button id="nudge-up" class="btn btn-primary" style="padding: 4px 8px; flex: 1;" disabled>⬆️</button>
                            <input type="number" id="prop-offset-y" value="0" disabled style="width: 60px; text-align: center; padding: 4px;">
                            <button id="nudge-down" class="btn btn-primary" style="padding: 4px 8px; flex: 1;" disabled>⬇️</button>
                        </div>
                    </div>
                    <div class="prop-group">
                        <label>Barva pozadí (Maskování)</label>
                        <div class="color-picker-wrap">
                            <input type="color" id="prop-bg" value="#ffffff" disabled>
                        </div>
                        <label class="checkbox-label mt-1">
                            <input type="checkbox" id="prop-bg-transparent" disabled> Průhledné
                        </label>
                    </div>
                    <div class="prop-group">
                        <label class="checkbox-label" title="Při exportu do DOCX se blok zapeče do pozadí obrázku">
                            <input type="checkbox" id="prop-locked" disabled> 🔒 Uzamknout (pro DOCX)
                        </label>
                    </div>
                    
                    <div class="prop-group" id="vectorize-options" style="display:none; margin-top: 15px;">
                        <label>Režim vektorizace</label>
                        <select id="vectorize-preset" class="text-input" style="padding: 4px; font-size: 0.85rem; width: 100%;">
                            <option value="logo" selected>Jednoduché logo / Tvary (Ostré, 4 barvy)</option>
                            <option value="default">Grafika (Střední, 16 barev)</option>
                            <option value="bw">Černobílé (Skica / Text)</option>
                            <option value="detailed">Detailní (Vyhlazené, více barev)</option>
                        </select>
                        <button id="vectorize-btn" class="btn btn-primary mt-2 w-full" style="background-color: #8b5cf6;" title="Převede obrázek na vektorový SVG objekt">✨ Vektorizovat</button>
                    </div>
                    
                    <button id="delete-block-btn" class="btn btn-danger mt-3 w-full" style="display:none;">Odstranit</button>
                </div>
            </aside>
            </div>

            <!-- Hlavní plátno (Canvas & Overlays) -->
            <main class="main-content">
                <!-- Zoom Controls -->
                <div id="zoom-controls" class="zoom-controls hidden">
                    <button id="zoom-out" class="zoom-btn" title="Oddálit">➖</button>
                    <span id="zoom-level">100%</span>
                    <button id="zoom-in" class="zoom-btn" title="Přiblížit">➕</button>
                </div>

                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">☁️</div>
                    <p>Nahrajte PDF dokument pro zahájení úprav</p>
                </div>

                <div id="workspace" class="workspace hidden">
                    <div id="pdf-container" class="pdf-container" data-mode="select">
                        <canvas id="pdf-canvas"></canvas>
                        <div id="overlay-container"></div>
                    </div>
                </div>
                
                <!-- Page Navigation -->
                <div id="page-controls" class="page-controls hidden">
                    <button id="prev-page" class="zoom-btn" title="Předchozí strana">◀</button>
                    <span id="page-info">Strana 1 z 1</span>
                    <button id="next-page" class="zoom-btn" title="Další strana">▶</button>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.error('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
